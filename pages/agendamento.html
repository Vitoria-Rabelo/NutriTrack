<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kaio Pereira, Alessy Kaua, Vitoria Rabelo, Mariana Arcelino, Priscila Holanda">

    <title>NutriTrack - Agendamentos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/agendamento.css">
    <link rel="icon" type="image/png" href="../assets/image/icon-logo.png">
</head>

<body>

    <aside class="sidebar">

        <figure class="nav-logo">
            <img src="../assets/image/logo.png" alt="Logo NutriTrack" class="img-logo">
            <figcaption class="logo-text">Nutricionista</figcaption>
        </figure>

        <nav class="navbar">

            <div class="nav-items">

                <a href="dashboard.html">
                    <i class="fa-regular fa-clipboard"></i>
                    Dashboard
                </a>

                <a href="agendamento.html" class="active">
                    <i class="fa-solid fa-calendar"></i>
                    Agendamentos
                </a>

                <a href="plano_alimentar_nutri.html">
                    <i class="fa-solid fa-clipboard-list"></i>
                    Planos Alimentares
                </a>

                <a href="evolucao_nutri.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Evolução Clientes
                </a>

            </div>

        </nav>

        <div class="nav-exit">

            <a class="exit" href="../index.html">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </a>

        </div>

    </aside>

    <main class="content">

        <header class="page-header">

            <div class="header-title-group">
                <h1 class="title-text">Agendamentos</h1>
                <p class="welcome-text">Bem-vinda, Dra. Maria Silva!</p>
            </div>

            <div class="user-top-profile">

                <div class="user-top-text">
                    <span class="user-top-name">Dra. Maria Silva</span>
                    <span class="user-top-since">CRN: 12345</span>
                </div>

                <div class="user-top-avatar">
                    DM
                </div>

            </div>

        </header>

        <div class="card">

            <div class="card-header">
                <div>
                    <h2>Consultas do dia</h2>
                    <input type="date" id="filtro-data">
                </div>

                <button class="btn-nova" id="btn-nova-consulta">
                    + Nova Consulta
                </button>

            </div>

            <form id="form-agendamento" >
                <div class="form-group">
                    <input type="text" id="paciente-nome" placeholder="Nome do paciente" required>
                    <input type="date" id="data-consulta" required>
                    <input type="time" id="hora-consulta" required>
                    
                    <select id="tipo-consulta" required>
                        <option value="Tipo da consulta" disabled selected>Tipo da consulta</option>
                        <option value="Primeira consulta">Primeira consulta</option>
                        <option value="Retorno">Retorno</option>
                        <option value="Avaliação">Avaliação</option>
                    </select>
                    
                    <select id="status-consulta">
                        <option value="Status da consulta" disabled selected>Status da consulta</option>
                        <option value="Aguardando">Aguardando</option>
                        <option value="Confirmada">Confirmada</option>
                    </select>
                    
                    <button type="submit" id="btn-salvar-agendamento">Salvar</button>
                </div>
                </form>

            <div class="listas-consultas" id="lista-consultas"></div>

        </div>

        <div class="resumo">

            <div class="box total">
                <p>Total de consultas</p>
                <h2 id="total-consultas">0</h2>
            </div>

            <div class="box confirmadas">
                <p>Confirmadas</p>
                <h2 id="total-confirmadas">0</h2>
            </div>

            <div class="box aguardando">
                <p>Aguardando</p>
                <h2 id="total-aguardando">0</h2>
            </div>

        </div>
    </main>


    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-regular fa-clipboard"></i>
            <span>Início</span>
        </a>
        <a href="agendamento.html" class="nav-item active">
            <i class="fa-solid fa-calendar"></i>
            <span>Agenda</span>
        </a>
        <a href="plano_alimentar_nutri.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>Planos</span>
        </a>
        <a href="evolucao_nutri.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i>
            <span>Evolução</span>
        </a>
    </nav>

    <script>
        let agendamentosGlobais = [];
        let agendamentoEditandoId = null;

        document.addEventListener("DOMContentLoaded", () => {
            const btnNovaConsulta = document.getElementById("btn-nova-consulta");
            const formAgendamento = document.getElementById("form-agendamento");
            const botaoSalvar = document.getElementById("btn-salvar-agendamento");
            const listaConsultas = document.getElementById("lista-consultas");
            
            btnNovaConsulta.addEventListener("click", () => {
                agendamentoEditandoId = null;
                botaoSalvar.textContent = "Salvar";
                formAgendamento.reset();
                formAgendamento.style.display = "block";
            });

            const filtroData = document.getElementById("filtro-data");

            filtroData.value = new Date().toISOString().split("T")[0];

            filtroData.addEventListener("change", () => {
                filtrarAgendamentosPorData();
            });

            formAgendamento.addEventListener("submit", async (event) => {
                event.preventDefault();

                const novoAgendamento = {
                    pacienteId: "manual",
                    pacienteNome: document.getElementById("paciente-nome").value,
                    data: document.getElementById("data-consulta").value,
                    hora: document.getElementById("hora-consulta").value,
                    tipoConsulta: document.getElementById("tipo-consulta").value,
                    status: document.getElementById("status-consulta").value
                };

                ;

                try {
                    const modoEdicao = agendamentoEditandoId !== null;
                    const resposta = await fetch(`http://localhost:3000/api/agendamentos/${agendamentoEditandoId || ""}`, {
                        method: modoEdicao ? "PUT" : "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(novoAgendamento)
                    });

                    if (!resposta.ok) {
                        throw new Error(modoEdicao ? "Erro ao atualizar agendamento." : "Erro ao salvar agendamento.");
                    }

                    agendamentoEditandoId = null;
                    botaoSalvar.textContent = "Salvar";
                    formAgendamento.reset();
                    formAgendamento.style.display = "none";
                    carregarAgendamentos();

                } catch (erro) {
                    console.error("Erro ao salvar agendamento:", erro);
                    alert("Falha ao salvar agendamento.");
                }
            });

            listaConsultas.addEventListener("click", async (event) => {
                const botao = event.target.closest("button");

                if (!botao) {
                    return;
                }

                const cardConsulta = botao.closest(".consulta");
                if (!cardConsulta) {
                    return;
                }

                const agendamentoId = cardConsulta.dataset.id;
                const agendamentoSelecionado = agendamentosGlobais.find((item) => item.id === agendamentoId);

                if (botao.classList.contains("btn-iniciar")) {
                    try {
                        const resposta = await fetch(`http://localhost:3000/api/agendamentos/${agendamentoId}`, {
                            method: "DELETE"
                        });

                        if (!resposta.ok) {
                            throw new Error("Erro ao remover agendamento.");
                        }

                        carregarAgendamentos();
                    } catch (erro) {
                        console.error("Erro ao iniciar consulta:", erro);
                        alert("Falha ao iniciar a consulta.");
                    }
                }

                if (botao.classList.contains("btn-reagendar")) {
                    if (!agendamentoSelecionado) {
                        return;
                    }

                    agendamentoEditandoId = agendamentoSelecionado.id;
                    botaoSalvar.textContent = "Atualizar";
                    formAgendamento.style.display = "block";

                    document.getElementById("paciente-nome").value = agendamentoSelecionado.pacienteNome || "";
                    document.getElementById("data-consulta").value = agendamentoSelecionado.data || "";
                    document.getElementById("hora-consulta").value = agendamentoSelecionado.hora || "";
                    document.getElementById("tipo-consulta").value = agendamentoSelecionado.tipoConsulta || "";
                    document.getElementById("status-consulta").value = agendamentoSelecionado.status || "Aguardando";
                }
            });

            carregarAgendamentos();
        });

        async function carregarAgendamentos() {
            try {
                const resposta = await fetch("http://localhost:3000/api/agendamentos");
                const agendamentos = await resposta.json();

                agendamentosGlobais = agendamentos;
                filtrarAgendamentosPorData();

            } catch (erro) {
                console.error("Erro ao carregar agendamentos:", erro);
                alert("Falha ao carregar agendamentos.");
            }
        }

        function filtrarAgendamentosPorData() {
            const dataSelecionada = document.getElementById("filtro-data").value;

            const agendamentosFiltrados = agendamentosGlobais.filter((agendamento) => {
                return agendamento.data === dataSelecionada;
            });

            mostrarAgendamentos(agendamentosFiltrados);
            atualizarResumo(agendamentosFiltrados);
        }

        function mostrarAgendamentos(agendamentos) {
            const lista = document.getElementById("lista-consultas");

            lista.innerHTML = "";

            agendamentos.forEach((agendamento) => {
                const consulta = document.createElement("div");
                consulta.classList.add("consulta");
                consulta.dataset.id = agendamento.id;

                consulta.innerHTML = `
                    <div class="hora">
                        ${agendamento.hora}
                    </div>

                    <div class="dados">
                        <h4>${agendamento.pacienteNome}</h4>
                        <p>${agendamento.tipoConsulta}</p>
                    </div>

                      <div class="acoes">
                        <span class="status ${agendamento.status === "Confirmada" ? "confirmada" : "aguardando"}">
                        ${agendamento.status}
                        </span>

                        <button type="button" class="btn-primary btn-iniciar">
                        Iniciar
                        </button>

                        <button type="button" class="btn-sec btn-reagendar">
                        Reagendar
                        </button>
                    </div>
                    `;

                lista.appendChild(consulta);
            });
        }

        function atualizarResumo(agendamentos) {
            const total = agendamentos.length;

            const confirmadas = agendamentos.filter((agendamento) => {
                return agendamento.status === "Confirmada";
            }).length;

            const aguardando = agendamentos.filter((agendamento) => {
                return agendamento.status === "Aguardando";
            }).length;

            document.getElementById("total-consultas").textContent = total;
            document.getElementById("total-confirmadas").textContent = confirmadas;
            document.getElementById("total-aguardando").textContent = aguardando;
        }
    </script>

</body>

</html>
