<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Kaio Pereira, Alessy Kaua, Vitoria Rabelo, Mariana Arcelino, Priscila Holanda">

    <title>NutriTrack - Agendamentos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/agendamento.css">
    <link rel="icon" type="image/png" href="../assets/image/icon-logo.png">
</head>

<body>

    <aside class="sidebar">

        <figure class="nav-logo">
            <img src="../assets/image/logo.png" alt="Logo NutriTrack" class="img-logo">
            <figcaption class="logo-text">Nutricionista</figcaption>
        </figure>

        <nav class="navbar">

            <div class="nav-items">

                <a href="dashboard.html">
                    <i class="fa-regular fa-clipboard"></i>
                    Dashboard
                </a>

                <a href="agendamento.html" class="active">
                    <i class="fa-solid fa-calendar"></i>
                    Agendamentos
                </a>

                <a href="plano_alimentar_nutri.html">
                    <i class="fa-solid fa-clipboard-list"></i>
                    Planos Alimentares
                </a>

                <a href="evolucao_nutri.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Evolução Clientes
                </a>

            </div>

        </nav>

        <div class="nav-exit">

            <a class="exit" href="../index.html">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </a>

        </div>

    </aside>

    <main class="content">

        <header class="page-header">

            <div class="header-title-group">
                <h1 class="title-text">Agendamentos</h1>
                <p class="welcome-text">Bem-vinda, Dra. Maria Silva!</p>
            </div>

            <div class="user-top-profile">

                <div class="user-top-text">
                    <span class="user-top-name">Dra. Maria Silva</span>
                    <span class="user-top-since">CRN: 12345</span>
                </div>

                <div class="user-top-avatar">
                    DM
                </div>

            </div>

        </header>

        <div class="card">

            <div class="card-header">

                <div>
                    <h2>Consultas de hoje</h2>
                    <p>Sábado, 02 de maio de 2026</p>
                </div>

                <button class="btn-nova">
                    + Nova Consulta
                </button>

            </div>

            <div class="listas-consultas" id="lista-consultas"></div>

        </div>

        <div class="resumo">

            <div class="box total">
                <p>Total de consultas</p>
                <h2 id="total-consultas">0</h2>
            </div>

            <div class="box confirmadas">
                <p>Confirmadas</p>
                <h2 id="total-confirmadas">0</h2>
            </div>

            <div class="box aguardando">
                <p>Aguardando</p>
                <h2 id="total-aguardando">0</h2>
            </div>

        </div>
    </main>


    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa-regular fa-clipboard"></i>
            <span>Início</span>
        </a>
        <a href="agendamento.html" class="nav-item active">
            <i class="fa-solid fa-calendar"></i>
            <span>Agenda</span>
        </a>
        <a href="plano_alimentar_nutri.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>Planos</span>
        </a>
        <a href="evolucao_nutri.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i>
            <span>Evolução</span>
        </a>
    </nav>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            carregarAgendamentos();
        });

        async function carregarAgendamentos() {
            try {
                const resposta = await fetch("http://localhost:3000/api/agendamentos");
                const agendamentos = await resposta.json();

                mostrarAgendamentos(agendamentos);
                atualizarResumo(agendamentos);
            } catch (erro) {
                console.error("Erro ao carregar agendamentos:", erro);
                alert("Falha ao carregar agendamentos.");
            }
        }

        function mostrarAgendamentos(agendamentos) {
            const lista = document.getElementById("lista-consultas");

            lista.innerHTML = "";

            agendamentos.forEach((agendamento) => {
                const consulta = document.createElement("div");
                consulta.classList.add("consulta");

                consulta.innerHTML = `
                    <div class="hora">
                        ${agendamento.hora}
                    </div>

                    <div class="dados">
                        <h4>${agendamento.pacienteNome}</h4>
                        <p>${agendamento.tipoConsulta}</p>
                    </div>

                    <div class="acoes">
                        <span class="status ${agendamento.status === "Confirmada" ? "confirmada" : "aguardando"}">
                        ${agendamento.status}
                        </span>

                        <button class="btn-primary">
                        Iniciar
                        </button>

                        <button class="btn-sec">
                        Reagendar
                        </button>
                    </div>
                    `;

                lista.appendChild(consulta);
            });
        }

        function atualizarResumo(agendamentos) {
            const total = agendamentos.length;

            const confirmadas = agendamentos.filter((agendamento) => {
                return agendamento.status === "Confirmada";
            }).length;

            const aguardando = agendamentos.filter((agendamento) => {
                return agendamento.status === "Aguardando";
            }).length;

            document.getElementById("total-consultas").textContent = total;
            document.getElementById("total-confirmadas").textContent = confirmadas;
            document.getElementById("total-aguardando").textContent = aguardando;
        }
    </script>

</body>

</html>
